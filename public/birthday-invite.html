<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Invite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style2.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="../index.html">← Back to Portfolio</a>
  </nav>

  <main>
    <div class="invite-card">
      <div class="invite-tag">You're Invited 🎉</div>
      <h1>It's My Birthday!</h1>
      <h2>On 29th April</h2>

      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJhLON2aQtymKXTzqjqMbghWt_YG50omBXIg&s"
        alt="Birthday cake"
        class="cake-img"
      />

      <div class="section">
        <h3>What to bring</h3>
        <ul>
          <li>🎈 Balloons (I love balloons)</li>
          <li>🎂 Cake (I love eating)</li>
          <li>🍽️ An appetite (There will be lots of food)</li>
        </ul>
      </div>

      <div class="section">
        <h3>Where to go</h3>
        <a href="https://maps.app.goo.gl/gApq2L4kNDBrC3n8A" target="_blank" rel="noopener" class="map-btn">
          📍 Open in Google Maps →
        </a>
      </div>
    </div>
  </main>
</body>
</html>
