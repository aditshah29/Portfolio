<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Adit Shah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style4.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="../index.html">← Back</a>
    <span class="nav-title">Contact</span>
  </nav>

  <main>
    <div class="page-header">
      <div class="label">// Contact</div>
      <h1>Get in <em>touch</em></h1>
    </div>

    <div class="contact-card">
      <div class="contact-row">
        <span class="contact-icon">📱</span>
        <div>
          <div class="contact-label">Mobile</div>
          <a href="tel:+918320732989" class="contact-value">+91 83207 32989</a>
        </div>
      </div>
      <div class="contact-row">
        <span class="contact-icon">✉️</span>
        <div>
          <div class="contact-label">Email</div>
          <a href="mailto:aditshah294@gmail.com" class="contact-value">aditshah294@gmail.com</a>
        </div>
      </div>
      <div class="contact-row">
        <span class="contact-icon">📍</span>
        <div>
          <div class="contact-label">Address</div>
          <div class="contact-value">25, Laksh Township-1, Jitodia Road, Anand</div>
        </div>
      </div>
    </div>

    <a href="mailto:aditshah294@gmail.com" class="cta-btn">Send an Email →</a>
  </main>

  <footer>
    <a href="../index.html">← Home</a>
    <a href="./about.html">About →</a>
  </footer>

  <script>
    document.querySelectorAll('.contact-row').forEach((row, i) => {
      row.style.opacity = '0';
      row.style.transform = 'translateX(-20px)';
      row.style.transition = `opacity 0.5s ease ${i * 0.1 + 0.2}s, transform 0.5s ease ${i * 0.1 + 0.2}s`;
      requestAnimationFrame(() => {
        row.style.opacity = '1';
        row.style.transform = 'translateX(0)';
      });
    });
  </script>
</body>
</html>
